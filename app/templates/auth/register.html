{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block body %}
  <div class="top-line"></div>
  <main class="auth-shell narrow">
    <section class="auth-panel">
      <h1>Регистрация</h1>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form method="post" action="/register">
        <div class="field">
          <label for="email">Ваш email:</label>
          <input id="email" name="email" type="email" value="{{ email or '' }}" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Ваш пароль:</label>
          <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>
        </div>
        <button class="primary full auth-submit" type="submit">Регистрация</button>
      </form>
      <p class="auth-switch">Есть аккаунт? <a href="/login">Вход</a></p>
    </section>
    <a class="button support-link" href="https://example.com">Поддержка</a>
  </main>
{% endblock %}
