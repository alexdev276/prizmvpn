{% extends "base.html" %}
{% block title %}Проверьте почту{% endblock %}
{% block body %}
  <main class="auth-shell">
    <section class="panel">
      <h1>Проверьте почту</h1>
      <p class="notice">Мы отправили ссылку подтверждения{% if email %} на {{ email }}{% endif %}. Она действует 24 часа.</p>
      <p><a class="button" href="/login">Перейти ко входу</a></p>
    </section>
  </main>
{% endblock %}
