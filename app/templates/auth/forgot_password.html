{% extends "base.html" %}
{% block title %}Сброс пароля{% endblock %}
{% block body %}
  <main class="auth-shell">
    <section class="panel">
      <h1>Сброс пароля</h1>
      {% if sent %}
        <p class="notice">Если аккаунт существует, ссылка для сброса уже отправлена на {{ email }}.</p>
      {% else %}
        <p class="muted">Введите email, и мы отправим ссылку для установки нового пароля.</p>
      {% endif %}
      <form method="post" action="/forgot-password">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" value="{{ email or '' }}" autocomplete="email" required>
        </div>
        <button class="full" type="submit">Отправить ссылку</button>
      </form>
    </section>
  </main>
{% endblock %}
